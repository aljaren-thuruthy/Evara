<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 350px;
            background: white;
            border-radius: 10px;
            padding: 30px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            background: #764ba2;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 15px;
            font-size: 14px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
            color: #764ba2;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="txt_email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="txt_password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="links">
                <a href="{% url 'Guest:Newuser' %}">User</a>
                <a href="{% url 'Guest:Serviceprovider' %}">Service Provider</a>
                <a href="{% url 'Guest:index' %}">Home</a>
            </div>
        </form>
    </div>
</body>
</html>
