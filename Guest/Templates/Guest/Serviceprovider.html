{% extends 'Guest/Head.html' %}
{% block content %}
{% load static %}

<style>

.card-header {
    background: linear-gradient(135deg, #007bff, #0056b3) !important;
    color: white;
}


.card-body,
.card-body label,
.card-body input,
.card-body select,
.card-body textarea {
    color: #000 !important;
}

.form-control, .form-select {
    color: #000 !important;
}


::placeholder {
    color: #555 !important;
}


label {
    font-weight: 600;
    color: #000 !important;
}

.text-danger {
    font-size: 0.8rem;
}

.btn-primary {
    background: linear-gradient(135deg, #007bff, #0056b3);
    border: none;
}

.btn-primary:hover {
    background: linear-gradient(135deg, #0056b3, #007bff);
}


.form-control:focus {
    border-color: #007bff;
    box-shadow: 0 0 5px rgba(0,123,255,0.5);
}
</style>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-header text-center">
                    <h5>📝 Service Provider Registration</h5>
                </div>

                <div class="card-body">

                    {% if msg %}
                    <div class="alert alert-success text-center">
                        {{ msg }}
                    </div>
                    {% endif %}

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row">

                           
                            <div class="col-md-6 mb-3">
                                <label>Full Name</label>
                                <input type="text" name="txt_name"
                                       value="{{ old.txt_name }}"
                                       class="form-control {% if errors.name %}border-danger{% endif %}">
                                <small class="text-danger">{{ errors.name }}</small>
                            </div>

                     
                            <div class="col-md-6 mb-3">
                                <label>Email</label>
                                <input type="text" name="txt_email"
                                       value="{{ old.txt_email }}"
                                       class="form-control {% if errors.email %}border-danger{% endif %}">
                                <small class="text-danger">{{ errors.email }}</small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Contact</label>
                                <input type="text" name="txt_contact"
                                       value="{{ old.txt_contact }}"
                                       class="form-control {% if errors.contact %}border-danger{% endif %}">
                                <small class="text-danger">{{ errors.contact }}</small>
                            </div>

                          
                            <div class="col-md-6 mb-3">
                                <label>District</label>
                                <select name="sel_district" id="sel_district" class="form-select">
                                    <option value="">Select</option>
                                    {% for i in districtdata %}
                                    <option value="{{i.id}}"
                                        {% if old.sel_district == i.id|stringformat:"s" %}selected{% endif %}>
                                        {{i.district_name}}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            
                            <div class="col-md-6 mb-3">
                                <label>Place</label>
                                <select name="sel_place" id="sel_place" class="form-select">
                                    <option value="">Select</option>
                                </select>
                            </div>

                   
                            <div class="col-md-6 mb-3">
                                <label>Service</label>
                                <select name="sel_service" class="form-select">
                                    <option value="">Select</option>
                                    {% for i in servicedata %}
                                    <option value="{{i.id}}"
                                        {% if old.sel_service == i.id|stringformat:"s" %}selected{% endif %}>
                                        {{i.serviceprovidertype_name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                         
                            <div class="col-12 mb-3">
                                <label>Address</label>
                                <textarea name="txt_address" class="form-control">{{ old.txt_address }}</textarea>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Photo</label>
                                <input type="file" name="txt_photo" class="form-control">
                            </div>

                        
                            <div class="col-md-6 mb-3">
                                <label>ID Proof</label>
                                <input type="file" name="txt_idproof" class="form-control">
                            </div>

                          
                            <div class="col-md-6 mb-3">
                                <label>Certificate</label>
                                <input type="file" name="txt_certificate" class="form-control">
                            </div>

                           
                            <div class="col-md-6 mb-3">
                                <label>Password</label>
                                <input type="password" name="txt_password"
                                       class="form-control {% if errors.password %}border-danger{% endif %}">
                                <small class="text-danger">{{ errors.password }}</small>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Register
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script>
$('#sel_district').change(function () {
    var did = $(this).val();
    $.ajax({
        url: "{% url 'Guest:Ajaxplace' %}",
        data: { did: did },
        success: function (data) {
            $('#sel_place').html(data);
        }
    });
});
</script>

{% endblock content %}
